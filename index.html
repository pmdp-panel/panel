<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>PMDP Odjezdová tabule</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="panel">

    <!-- Horní označník -->
    <div class="oznacnik">
        <img src="tram.png" class="tram-icon">
        <div id="stopName">Zadej zastávku</div>
    </div>

    <!-- Vyhledání -->
    <div class="search">
        <input id="stopInput" placeholder="Např. Anglické nábřeží">
        <button onclick="loadStop()">Zobrazit</button>
    </div>

    <!-- Odjezdová tabule -->
    <div id="departures"></div>

</div>

<script src="script.js"></script>
</body>
</html>
