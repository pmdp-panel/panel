<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>PMDP Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="panel">

    <!-- označník -->
    <div class="oznacnik">
        <img src="tram.png" class="tram-icon">
        <div id="stopName">Vyber zastávku</div>
    </div>

    <!-- seznam zastávek -->
    <div class="search">
        <select id="stopSelect"></select>
        <button onclick="selectStop()">Zobrazit</button>
    </div>

    <!-- info -->
    <div id="departures">
        Načítám seznam zastávek...
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
